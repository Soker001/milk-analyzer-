name: DairyDash Automation & Security Verification Dashboard

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  publish_reports_summary:
    name: Parse and Publish Excel Reports Summary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl pandas

      - name: Generate and Publish Reports Dashboard
        run: |
          python tests/publish_available_reports_summary.py

      - name: Upload Appium Mobile E2E Report
        uses: actions/upload-artifact@v4
        with:
          name: Appium-Mobile-E2E-Report
          path: "appiumtest/appium report.xlsx"

      - name: Upload Selenium Web E2E Report
        uses: actions/upload-artifact@v4
        with:
          name: Selenium-Web-E2E-Report
          path: "appiumtest/selineum report.xlsx"

      - name: Upload Security Control Verification Report
        uses: actions/upload-artifact@v4
        with:
          name: Security-Control-Verification-Report
          path: "appiumtest/Security_Control_Test_Cases_Report_400.xlsx"

      - name: Upload Load Performance Excel Report
        uses: actions/upload-artifact@v4
        with:
          name: Load-Performance-Report
          path: "appiumtest/Load_Test_Report_20260618_144332.xlsx"
